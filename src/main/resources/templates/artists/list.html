<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanatçılar | MelodiKit</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<nav class="site-nav">
    <a class="brand" href="/"><span>Melodi</span>Kit</a>
    <div class="nav-links">
        <a href="/genres">Türler</a>
        <a href="/artists">Sanatçılar</a>
        <a href="/albums">Albümler</a>
        <a href="/songs">Şarkılar</a>
        <a href="/playlists">Playlistler</a>
    </div>
</nav>

<main class="page">
    <div class="page-header">
        <div>
            <h1>Sanatçılar</h1>
            <p>Şarkı koleksiyonundaki sanatçıları düzenli tut.</p>
        </div>
        <a th:href="@{/artists/new}" class="btn btn-primary">Yeni Sanatçı Ekle</a>
    </div>

    <div th:if="${#lists.isEmpty(artists)}" class="empty-state">Henüz sanatçı yok. İlk sanatçını ekleyebilirsin.</div>

    <div class="grid" th:if="${!#lists.isEmpty(artists)}">
        <div th:each="artist : ${artists}" class="card">
            <div class="cover circle">
                <img th:if="${artist.imageUrl != null and !artist.imageUrl.isEmpty()}" th:src="${artist.imageUrl}" alt="sanatçı">
                <span th:if="${artist.imageUrl == null or artist.imageUrl.isEmpty()}">🎤</span>
            </div>
            <div class="item-title" th:text="${artist.name}">Sanatçı adı</div>
            <div class="item-meta" th:text="${artist.country != null and !artist.country.isEmpty() ? artist.country : 'Ülke yok'}">Ülke</div>
            <div class="item-actions">
                <a th:href="@{/artists/{id}(id=${artist.id})}" class="btn btn-primary">Detay</a>
                <a th:href="@{/artists/edit/{id}(id=${artist.id})}" class="btn btn-secondary">Düzenle</a>
                <a th:href="@{/artists/delete/{id}(id=${artist.id})}" class="btn btn-secondary btn-danger" onclick="return confirm('Silmek istediğinizden emin misiniz?')">Sil</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
