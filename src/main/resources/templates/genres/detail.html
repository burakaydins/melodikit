<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tür Detay | MelodiKit</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<nav class="site-nav">
    <a class="brand" href="/"><span>Melodi</span>Kit</a>
    <div class="nav-links">
        <a href="/genres">Türler</a>
        <a href="/artists">Sanatçılar</a>
        <a href="/albums">Albümler</a>
        <a href="/songs">Şarkılar</a>
        <a href="/playlists">Playlistler</a>
        <a href="/stats">İstatistikler</a>
    </div>
    <div class="nav-user">
        <span th:if="${currentUser != null}" th:text="${currentUser.displayName}">Kullanıcı</span>
        <a th:if="${currentUser == null}" href="/login">Giriş</a>
        <a th:if="${currentUser != null}" href="/logout">Çıkış</a>
    </div>
</nav>

<main class="page">
    <section th:if="${genre != null}" class="visual-hero">
        <img th:if="${genre.imageUrl != null and !genre.imageUrl.isEmpty()}" th:src="${genre.imageUrl}" alt="tür banner">
        <img th:if="${genre.imageUrl == null or genre.imageUrl.isEmpty()}" src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1200&q=80" alt="tür banner">
        <div class="visual-hero-copy">
            <span>Müzik Türü</span>
            <h1 th:text="${genre.name}">Tür</h1>
            <p th:text="${#lists.size(songs) + ' şarkı'}">0 şarkı</p>
        </div>
    </section>

    <div class="page-header">
        <div>
            <h1 th:text="${genre != null ? genre.name : 'Tür bulunamadı'}">Tür</h1>
            <p th:if="${genre != null}" th:text="${#lists.size(songs) + ' şarkı - ' + totalDuration / 60 + ' dk ' + totalDuration % 60 + ' sn'}">0 şarkı</p>
            <p th:if="${genre == null}">Bu tür kaydı bulunamadı.</p>
        </div>
        <div class="item-actions">
            <a href="/genres" class="btn btn-secondary">Türlere Dön</a>
            <a th:if="${genre != null}" th:href="@{/songs(genreId=${genre.id})}" class="btn btn-primary">Filtrede Aç</a>
        </div>
    </div>

    <section th:if="${genre != null}">
        <h2 class="section-title">Bu Türdeki Şarkılar</h2>
        <div th:if="${#lists.isEmpty(songs)}" class="empty-state">Bu türe bağlı şarkı yok.</div>
        <div th:each="song, stat : ${songs}" class="song-row">
            <div class="song-index" th:text="${stat.index + 1}">1</div>
            <div>
                <div class="item-title" th:text="${song.title}">Şarkı</div>
                <div class="item-meta" th:text="${song.artist != null ? song.artist.name : 'Sanatçı yok'}">Sanatçı</div>
                <div class="item-desc" th:text="${song.album != null ? song.album.title : 'Albüm yok'}">Albüm</div>
                <div class="item-desc play-count" data-play-count-suffix=" dinlenme" th:attr="data-play-count-song-id=${song.id}" th:text="${song.playCount + ' dinlenme'}">0 dinlenme</div>
            </div>
            <div class="song-row-actions">
                <div class="item-meta" th:text="${song.duration / 60 + ':' + (song.duration % 60 < 10 ? '0' + song.duration % 60 : song.duration % 60)}">0:00</div>
                <a th:href="@{/songs/{id}(id=${song.id})}" class="btn btn-secondary">Detay</a>
            </div>
        </div>
    </section>
</main>
<script th:src="@{/js/player.js}"></script>
</body>
</html>
