<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tür Formu | MelodiKit</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<nav class="site-nav">
    <a class="brand" href="/"><span>Melodi</span>Kit</a>
    <div class="nav-links">
        <a href="/genres">Türler</a>
        <a href="/artists">Sanatçılar</a>
        <a href="/albums">Albümler</a>
        <a href="/songs">Şarkılar</a>
        <a href="/playlists">Playlistler</a>
    </div>
</nav>

<main class="page">
    <div class="page-header">
        <div>
            <h1>Müzik Türü</h1>
            <p>Yeni tür ekle veya mevcut tür adını güncelle.</p>
        </div>
    </div>

    <div class="form-card">
        <form th:action="@{/genres/save}" th:object="${genre}" method="post">
            <input type="hidden" th:field="*{id}">
            <label class="form-label">TÜR ADI</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Örn: Pop, Rock, Jazz">

            <label class="form-label">FOTOĞRAF URL</label>
            <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://...jpg">

            <button type="submit" class="btn btn-primary">Kaydet</button>
            <a href="/genres" class="btn btn-secondary">Geri Dön</a>
        </form>
    </div>
</main>
</body>
</html>
